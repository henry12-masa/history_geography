<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>総合クイズサイト200問</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Yu Gothic","Hiragino Sans",sans-serif;background:linear-gradient(135deg,#fff3d4,#8fd3ff);min-height:100vh;color:#222}
.ad-top{position:fixed;top:12px;right:12px;width:300px;height:90px;border:2px dashed #555;border-radius:12px;background:white;display:flex;align-items:center;justify-content:center;text-align:center;z-index:10;font-size:14px;color:#555}
.wrap{max-width:900px;margin:auto;padding:120px 16px 40px}
.game{background:rgba(255,255,255,.96);border:4px solid #555;border-radius:24px;padding:26px;text-align:center;box-shadow:0 12px 30px rgba(0,0,0,.22)}
h1{margin-top:0;font-size:34px}
h2{margin-bottom:6px}
.menu{display:grid;gap:14px;margin-top:20px}
button{font-size:18px;padding:14px;border:none;border-radius:14px;cursor:pointer;background:#1976a3;color:white;font-weight:bold;transition:.15s}
button:hover{transform:scale(1.03);opacity:.95}
.history{background:#8b5a2b}
.geo{background:#1976a3}
.back{background:#555}
.status{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-weight:bold;margin-bottom:18px;background:#f5f5f5;border-radius:12px;padding:10px}
.question{font-size:22px;font-weight:bold;background:#f3f8ff;border-radius:16px;padding:22px;margin-bottom:20px;line-height:1.6}
.choices{display:grid;gap:12px}
.correct{background:#2e8b57!important}
.wrong{background:#b22222!important}
.result{font-size:22px;font-weight:bold;margin-top:18px;min-height:32px}
.comment{margin-top:12px;font-size:15px;color:#345;line-height:1.6}
.next{margin-top:18px;background:#1f4e79;display:none}
.restart{margin-top:18px;background:#6b3fa0;display:none}
.ad-bottom{margin-top:24px;height:100px;border:2px dashed #555;border-radius:14px;background:white;display:flex;justify-content:center;align-items:center;text-align:center;font-size:14px;color:#555}
.hidden{display:none}
.badge{display:inline-block;background:#fff3d4;border:1px solid #d3a64d;border-radius:999px;padding:6px 12px;margin:4px;font-weight:bold}
.small{font-size:14px;color:#555;line-height:1.6}
@media(max-width:900px){.ad-top{position:static;width:auto;height:70px;margin:12px}.wrap{padding-top:20px}h1{font-size:28px}.question{font-size:19px}button{font-size:16px}}
</style>
</head>
<body>

<div class="ad-top">広告枠・右上<br>AdSenseコードはここ</div>

<div class="wrap">
<div class="game">
<h1>🎮 総合クイズサイト200問</h1>

<div id="categoryMenu">
  <p>遊びたいジャンルを選んでください</p>
  <div>
    <span class="badge">🏯 歴史100問</span>
    <span class="badge">🌏 地理100問</span>
    <span class="badge">合計200問</span>
  </div>
  <div class="menu">
    <button class="history" onclick="selectCategory('history')">🏯 歴史クイズ</button>
    <button class="geo" onclick="selectCategory('geo')">🌏 地理クイズ</button>
    <button onclick="selectCategory('mix')">🎲 歴史＋地理ミックス</button>
  </div>
</div>

<div id="levelMenu" class="hidden">
  <h2 id="categoryTitle"></h2>
  <p>難易度を選んでください</p>
  <div class="menu">
    <button onclick="startGame('easy')">初級</button>
    <button onclick="startGame('normal')">中級</button>
    <button onclick="startGame('hard')">上級</button>
    <button onclick="startGame('all')">全問ランダム</button>
    <button class="back" onclick="backToCategory()">ジャンル選択に戻る</button>
  </div>
  <p class="small">※ミックスを選ぶと、歴史と地理を混ぜて出題します。</p>
</div>

<div id="quiz" class="hidden">
  <div class="status">
    <div>ジャンル：<span id="categoryName"></span></div>
    <div>難易度：<span id="levelName"></span></div>
    <div>問題：<span id="count"></span>/<span id="total"></span></div>
    <div>スコア：<span id="score">0</span></div>
  </div>

  <div class="question" id="question"></div>
  <div class="choices" id="choices"></div>
  <div class="result" id="result"></div>
  <div class="comment" id="comment"></div>

  <button class="next" id="nextBtn" onclick="nextQuestion()">次の問題へ</button>
  <button class="restart" id="restartBtn" onclick="backToLevel()">難易度選択に戻る</button>
</div>

<div class="ad-bottom">広告枠・下部<br>AdSenseコードはここ</div>
</div>
</div>

let selectedCategory = "";
let currentQuiz = [];
let current = 0;
let score = 0;
let answered = false;

const categoryMenu = document.getElementById("categoryMenu");
const levelMenu = document.getElementById("levelMenu");
const quiz = document.getElementById("quiz");
const categoryTitle = document.getElementById("categoryTitle");
const categoryName = document.getElementById("categoryName");
const levelName = document.getElementById("levelName");
const questionEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const resultEl = document.getElementById("result");
const commentEl = document.getElementById("comment");
const countEl = document.getElementById("count");
const totalEl = document.getElementById("total");
const scoreEl = document.getElementById("score");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function getAllQuestions() {
  if (selectedCategory === "mix") {
    return [...quizDB.history, ...quizDB.geo];
  }
  return quizDB[selectedCategory];
}

function selectCategory(category) {
  selectedCategory = category;

  if(category === "history") {
    categoryTitle.textContent = "🏯 歴史クイズ";
    categoryName.textContent = "歴史";
  } else if(category === "geo") {
    categoryTitle.textContent = "🌏 地理クイズ";
    categoryName.textContent = "地理";
  } else {
    categoryTitle.textContent = "🎲 歴史＋地理ミックス";
    categoryName.textContent = "ミックス";
  }

  categoryMenu.classList.add("hidden");
  levelMenu.classList.remove("hidden");
}

function startGame(level) {
  const all = getAllQuestions();

  if(level === "all") {
    currentQuiz = shuffle([...all]);
    levelName.textContent = "全問";
  } else {
    currentQuiz = shuffle(all.filter(x => x.level === level));
    levelName.textContent =
      level === "easy" ? "初級" :
      level === "normal" ? "中級" : "上級";
  }

  current = 0;
  score = 0;
  scoreEl.textContent = score;
  totalEl.textContent = currentQuiz.length;

  levelMenu.classList.add("hidden");
  quiz.classList.remove("hidden");
  restartBtn.style.display = "none";

  loadQuestion();
}

function loadQuestion() {
  answered = false;
  resultEl.textContent = "";
  commentEl.textContent = "";
  nextBtn.style.display = "none";
  choicesEl.innerHTML = "";

  const q = currentQuiz[current];
  countEl.textContent = current + 1;
  questionEl.textContent = q.q;

  shuffle([...q.c]).forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(btn, choice);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(button, selected) {
  if(answered) return;
  answered = true;

  const q = currentQuiz[current];
  const buttons = choicesEl.querySelectorAll("button");

  buttons.forEach(btn => {
    btn.disabled = true;
    if(btn.textContent === q.a) btn.classList.add("correct");
  });

  if(selected === q.a) {
    score += 10;
    scoreEl.textContent = score;
    resultEl.textContent = "正解！";
  } else {
    button.classList.add("wrong");
    resultEl.textContent = "不正解…";
  }

  commentEl.textContent = q.e;

  if(current < currentQuiz.length - 1) {
    nextBtn.style.display = "inline-block";
  } else {
    finishGame();
  }
}

function nextQuestion() {
  current++;
  loadQuestion();
}

function finishGame() {
  const max = currentQuiz.length * 10;
  const rate = Math.round(score / max * 100);

  questionEl.textContent = "ゲーム終了！";
  choicesEl.innerHTML = "";
  nextBtn.style.display = "none";
  restartBtn.style.display = "inline-block";

  commentEl.textContent = `スコアは ${score}/${max} 点、正答率 ${rate}% です。`;

  if(rate === 100) {
    resultEl.textContent = "🏆 全問正解！クイズ博士です！";
  } else if(rate >= 80) {
    resultEl.textContent = "🎉 かなり優秀です！";
  } else if(rate >= 50) {
    resultEl.textContent = "👍 まずまずです！";
  } else {
    resultEl.textContent = "📚 もう一度挑戦しよう！";
  }
}

function backToCategory() {
  levelMenu.classList.add("hidden");
  categoryMenu.classList.remove("hidden");
}

function backToLevel() {
  quiz.classList.add("hidden");
  levelMenu.classList.remove("hidden");
}
</script>
</body>
</html>
