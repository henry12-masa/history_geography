let selectedCategory = "";
let currentQuiz = [];
let current = 0;
let score = 0;
let answered = false;

const categoryMenu = document.getElementById("categoryMenu");
const levelMenu = document.getElementById("levelMenu");
const quiz = document.getElementById("quiz");
const categoryTitle = document.getElementById("categoryTitle");
const categoryName = document.getElementById("categoryName");
const levelName = document.getElementById("levelName");
const questionEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const resultEl = document.getElementById("result");
const commentEl = document.getElementById("comment");
const countEl = document.getElementById("count");
const totalEl = document.getElementById("total");
const scoreEl = document.getElementById("score");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function getAllQuestions() {
  if (selectedCategory === "mix") {
    return [...quizDB.history, ...quizDB.geo];
  }
  return quizDB[selectedCategory];
}

function selectCategory(category) {
  selectedCategory = category;

  if(category === "history") {
    categoryTitle.textContent = "? ?????";
    categoryName.textContent = "??";
  } else if(category === "geo") {
    categoryTitle.textContent = "? ?????";
    categoryName.textContent = "??";
  } else {
    categoryTitle.textContent = "? ?????????";
    categoryName.textContent = "????";
  }

  categoryMenu.classList.add("hidden");
  levelMenu.classList.remove("hidden");
}

function startGame(level) {
  const all = getAllQuestions();

  if(level === "all") {
    currentQuiz = shuffle([...all]);
    levelName.textContent = "??";
  } else {
    currentQuiz = shuffle(all.filter(x => x.level === level));
    levelName.textContent =
      level === "easy" ? "??" :
      level === "normal" ? "??" : "??";
  }

  current = 0;
  score = 0;
  scoreEl.textContent = score;
  totalEl.textContent = currentQuiz.length;

  levelMenu.classList.add("hidden");
  quiz.classList.remove("hidden");
  restartBtn.style.display = "none";

  loadQuestion();
}

function loadQuestion() {
  answered = false;
  resultEl.textContent = "";
  commentEl.textContent = "";
  nextBtn.style.display = "none";
  choicesEl.innerHTML = "";

  const q = currentQuiz[current];
  countEl.textContent = current + 1;
  questionEl.textContent = q.q;

  shuffle([...q.c]).forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(btn, choice);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(button, selected) {
  if(answered) return;
  answered = true;

  const q = currentQuiz[current];
  const buttons = choicesEl.querySelectorAll("button");

  buttons.forEach(btn => {
    btn.disabled = true;
    if(btn.textContent === q.a) btn.classList.add("correct");
  });

  if(selected === q.a) {
    score += 10;
    scoreEl.textContent = score;
    resultEl.textContent = "???";
  } else {
    button.classList.add("wrong");
    resultEl.textContent = "????";
  }

  commentEl.textContent = q.e;

  if(current < currentQuiz.length - 1) {
    nextBtn.style.display = "inline-block";
  } else {
    finishGame();
  }
}

function nextQuestion() {
  current++;
  loadQuestion();
}

function finishGame() {
  const max = currentQuiz.length * 10;
  const rate = Math.round(score / max * 100);

  questionEl.textContent = "??????";
  choicesEl.innerHTML = "";
  nextBtn.style.display = "none";
  restartBtn.style.display = "inline-block";

  commentEl.textContent = `???? ${score}/${max} ????? ${rate}% ???`;

  if(rate === 100) {
    resultEl.textContent = "? ?????????????";
  } else if(rate >= 80) {
    resultEl.textContent = "? ????????";
  } else if(rate >= 50) {
    resultEl.textContent = "? ???????";
  } else {
    resultEl.textContent = "? ??????????";
  }
}

function backToCategory() {
  levelMenu.classList.add("hidden");
  categoryMenu.classList.remove("hidden");
}

function backToLevel() {
  quiz.classList.add("hidden");
  levelMenu.classList.remove("hidden");
}
